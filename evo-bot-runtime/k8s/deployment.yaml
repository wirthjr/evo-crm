apiVersion: apps/v1
kind: Deployment
metadata:
  name: evo-bot-runtime
  labels:
    app: evo-bot-runtime
spec:
  replicas: 2
  selector:
    matchLabels:
      app: evo-bot-runtime
  template:
    metadata:
      labels:
        app: evo-bot-runtime
    spec:
      containers:
        - name: evo-bot-runtime
          image: evo-bot-runtime:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8091
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
          env:
            # Non-secret vars from ConfigMap
            - name: LISTEN_ADDR
              valueFrom:
                configMapKeyRef:
                  name: evo-bot-runtime-config
                  key: LISTEN_ADDR
            - name: AI_PROCESSOR_URL
              valueFrom:
                configMapKeyRef:
                  name: evo-bot-runtime-config
                  key: AI_PROCESSOR_URL
            - name: AI_CALL_TIMEOUT_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: evo-bot-runtime-config
                  key: AI_CALL_TIMEOUT_SECONDS
            # Secrets
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: evo-bot-runtime-secret
                  key: REDIS_URL
            - name: BOT_RUNTIME_SECRET
              valueFrom:
                secretKeyRef:
                  name: evo-bot-runtime-secret
                  key: BOT_RUNTIME_SECRET
            - name: AI_PROCESSOR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: evo-bot-runtime-secret
                  key: AI_PROCESSOR_API_KEY
          livenessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 2
