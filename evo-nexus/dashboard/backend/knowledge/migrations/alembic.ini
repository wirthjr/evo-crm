# Alembic configuration for Knowledge Base remote Postgres migrations.
# The actual database URL is injected at runtime by auto_migrator.py — this
# file exists only to provide the script_location and mako_template_file settings.

[alembic]
script_location = %(here)s
version_locations = %(here)s/versions
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 40
timezone = UTC

# --- Logging (required by alembic's fileConfig) ---
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
