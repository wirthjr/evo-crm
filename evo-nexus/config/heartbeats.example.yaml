# Heartbeats — Proactive Agent Configuration
# Source of truth for all heartbeat definitions.
# DB mirrors this file; UI reads/writes through the API which updates both.
#
# Fields:
#   id              — unique slug (kebab-case)
#   agent           — agent file stem from .claude/agents/ (without .md)
#   interval_seconds — minimum 60; use multiples of 3600 for hourly cadences
#   max_turns       — hard cap on Claude turns per run (default: 10)
#   timeout_seconds — hard kill timeout for subprocess (default: 600)
#   lock_timeout_seconds — stale lock cleanup threshold (default: 1800)
#   wake_triggers   — list from: [interval, new_task, mention, manual, approval_decision]
#   enabled         — false = dormant; set true via UI toggle or YAML edit to activate
#   goal_id         — (stub, Feature 1.2) links to a goal for context injection
#   required_secrets — (stub, Feature 2.3) list of .env key names this agent needs
#   decision_prompt — the decision question the agent answers in step 4 of the protocol
#   handler         — (Wave 2.2r) optional Python module.function for in-process handlers.
#                     If set, heartbeat_runner calls this function directly instead of
#                     spawning a Claude CLI subprocess. max_turns must be 0.
#                     Format: "module_name.function_name"
#
# IMPORTANT: All seeds start with enabled: false.
# Davidson enables individually via UI toggle after reviewing in staging.

heartbeats:

  # Atlas — Linear/GitHub triage every 4 hours
  - id: atlas-4h
    agent: atlas-project
    interval_seconds: 14400  # 4 hours
    max_turns: 10
    timeout_seconds: 300
    lock_timeout_seconds: 1800
    wake_triggers:
      - interval
      - mention
      - manual
    enabled: false
    goal_id: null
    required_secrets: []
    decision_prompt: >
      You are Atlas, the project agent. Review Linear for stale PRs and issues older
      than 3 days with no activity. Check GitHub for open PRs waiting on review.
      Decide: should you act now (comment, triage, escalate) or is there nothing
      urgent? Respond with a JSON object: {"action": "work"|"skip", "reason": "<1 sentence>",
      "tasks": [<list of issue ids to touch, if action=work>]}.

  # Zara — Customer support queue triage every 2 hours
  - id: zara-2h
    agent: zara-cs
    interval_seconds: 7200  # 2 hours
    max_turns: 15
    timeout_seconds: 300
    lock_timeout_seconds: 1800
    wake_triggers:
      - interval
      - new_task
      - manual
    enabled: false
    goal_id: null
    required_secrets: []
    decision_prompt: >
      You are Zara, the customer success agent. Check the support queue for tickets
      with status "open" or "pending" assigned to you. Pick the highest-priority ticket
      (by urgency label, then oldest created_at). Decide: should you work on it now
      or is the queue empty/nothing actionable? Respond with JSON:
      {"action": "work"|"skip", "reason": "<1 sentence>",
      "ticket_id": "<id or null>"}.

  # Flux — Payments and financial alerts every 6 hours
  - id: flux-6h
    agent: flux-finance
    interval_seconds: 21600  # 6 hours
    max_turns: 10
    timeout_seconds: 300
    lock_timeout_seconds: 1800
    wake_triggers:
      - interval
      - manual
    enabled: false
    goal_id: null
    required_secrets:
      - STRIPE_KEY
      - OMIE_APP_KEY
    decision_prompt: >
      You are Flux, the finance agent. Check Stripe for failed payments or
      subscriptions that lapsed in the last 6 hours. Check Omie for pending NF-e
      that need action. Decide: is there something urgent requiring action or escalation
      to Davidson via Telegram? Respond with JSON:
      {"action": "work"|"skip", "reason": "<1 sentence>",
      "alerts": [<list of critical items, if any>]}.

  # integrations-health — Wave 2.2r in-process HTTP health check for plugin integrations
  # Runs every 15 minutes; zero Claude CLI invocations (in-process Python handler).
  # Enable via UI toggle after reviewing plugin integrations in /integrations.
  - id: integrations-health
    agent: system
    interval_seconds: 900  # 15 minutes
    max_turns: 0
    timeout_seconds: 60
    lock_timeout_seconds: 1800
    wake_triggers:
      - interval
      - manual
    enabled: false
    goal_id: null
    required_secrets: []
    handler: plugin_integration_health.tick
    decision_prompt: ""
