name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the information below to help us investigate.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: dropdown
    id: service
    attributes:
      label: Affected Service
      description: Which service is affected?
      options:
        - Auth Service (evo-auth-service-community)
        - CRM Service (evo-ai-crm-community)
        - Frontend (evo-ai-frontend-community)
        - Processor (evo-ai-processor-community)
        - Core Service (evo-ai-core-service-community)
        - Docker / Setup
        - Unknown
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your setup details.
      placeholder: |
        - OS: macOS 15 / Ubuntu 24.04 / Windows 11 WSL2
        - Docker version: 27.x
        - Browser: Chrome 130
      value: |
        - OS:
        - Docker version:
        - Browser:
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots.

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any error logs here.
      render: shell
