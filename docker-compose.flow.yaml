# Network configuration
networks:
  evo-ai-network:
    external: true
    name: local-net

volumes:
  evo_campaign_clickhouse_data:
    driver: local
  ## ZOOKEEPER
  evo_campaign_zookeeper_data:
    driver: local
  evo_campaign_zookeeper_logs:
    driver: local
  ## KAFKA
  evo_campaign_kafka_data:
    driver: local

services:
  ## CLICKHOUSE
  evo-campaign-clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: evo-campaign-clickhouse
    networks:
      - evo-ai-network
    ports:
      - "8123:8123" # HTTP interface
      - "9000:9000" # Native client interface
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: password
      CLICKHOUSE_DB: default
    volumes:
      - evo_campaign_clickhouse_data:/var/lib/clickhouse
      - ./evo-flow/docker/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./evo-flow/docker/clickhouse/config.xml:/etc/clickhouse-server/config.d/custom.xml
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "clickhouse-client",
          "--user",
          "default",
          "--password",
          "${CLICKHOUSE_PASSWORD:-password}",
          "--query",
          "SELECT 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  ## ZOOKEEPER
  evo-campaign-zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: evo-campaign-zookeeper
    hostname: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    networks:
      - evo-ai-network
    volumes:
      - evo_campaign_zookeeper_data:/var/lib/zookeeper/data
      - evo_campaign_zookeeper_logs:/var/lib/zookeeper/log

  ## KAFKA
  evo-campaign-kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: evo-campaign-kafka
    hostname: kafka
    depends_on:
      - evo-campaign-zookeeper
    ports:
      - "9092:9092"
      - "9094:9094"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "evo-campaign-zookeeper:2181"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://evo-campaign-kafka:29092,PLAINTEXT_HOST://localhost:9092,OUTSIDE://host.docker.internal:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168 # 7 days
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_COMPRESSION_TYPE: "gzip"
    networks:
      - evo-ai-network
    volumes:
      - evo_campaign_kafka_data:/var/lib/kafka/data

  ## KAFKA UI
  evo-campaign-kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: evo-campaign-kafka-ui
    depends_on:
      - evo-campaign-kafka
    ports:
      - "8092:8092"
    environment:
      KAFKA_CLUSTERS_0_NAME: evo-campaign
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: evo-campaign-kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: evo-campaign-zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"
      KAFKA_UI_SERVER_PORT: "8092"
    networks:
      - evo-ai-network

  ## TEMPORAL SERVER (using shared PostgreSQL)
  evo-campaign-temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: evo-campaign-temporal
    networks:
      - evo-ai-network
    ports:
      - "7233:7233" # gRPC
      - "8233:8233" # UI
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=root
      - POSTGRES_SEEDS=evo-ai-postgres
      - POSTGRES_DB=temporal
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    volumes:
      - ./evo-flow/docker/temporal:/etc/temporal/config/dynamicconfig
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "tctl",
          "--address",
          "localhost:7233",
          "workflow",
          "list",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s