version: "3.8"

# =============================================================================
# Evo CRM Community - Local Production Test
# =============================================================================
# Simulates the production swarm stack locally using docker compose.
# Uses the same Docker Hub images that would run in production.
#
# RAILS_ENV is set to production, so BACKEND_URL and FRONTEND_URL must be
# non-localhost values (the CRM refuses to boot in production with localhost).
# On Mac/Windows: host.docker.internal works out of the box.
# On Linux: use the host LAN IP or add extra_hosts mapping.
#
# Usage:
#   BACKEND_URL=http://host.docker.internal:3030 \
#   FRONTEND_URL=http://host.docker.internal:5173 \
#     docker compose -f docker-compose.prod-test.yaml up -d
#   docker compose -f docker-compose.prod-test.yaml logs -f
#   docker compose -f docker-compose.prod-test.yaml down -v
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  evo_postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    volumes:
      - evo_postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: evo_community
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: evoai_dev_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  evo_redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    command: ["sh", "-c", "redis-server --requirepass evoai_redis_pass --appendonly yes"]
    volumes:
      - evo_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "evoai_redis_pass", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # API Gateway (Nginx) — Port 3030
  # ---------------------------------------------------------------------------
  evo_gateway:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "3030:3030"
    depends_on:
      evo_auth:
        condition: service_healthy
      evo_crm:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Auth Service (Ruby / Rails) — Port 3001
  # ---------------------------------------------------------------------------
  evo_auth:
    image: evoapicloud/evo-auth-service-community:latest
    command: sh -c "bundle exec rails db:prepare && bundle exec rails s -p 3001 -b 0.0.0.0"
    ports:
      - "3001:3001"
    environment:
      RAILS_ENV: production
      RAILS_MAX_THREADS: 5
      SECRET_KEY_BASE: "a]i9F#k2$$Lm7Nq0R!sT4uW6xZ8bD1eG3hJ5oP7rV9yAcE2fH4jM6pS8vX0zB3dK5nQ7tU9wY1"
      JWT_SECRET_KEY: "a]i9F#k2$$Lm7Nq0R!sT4uW6xZ8bD1eG3hJ5oP7rV9yAcE2fH4jM6pS8vX0zB3dK5nQ7tU9wY1"
      EVOAI_CRM_API_TOKEN: 6e10e689-58ce-4416-bf0d-f5818bf2dcf8
      POSTGRES_HOST: evo_postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: evoai_dev_password
      POSTGRES_DATABASE: evo_community
      REDIS_URL: redis://:evoai_redis_pass@evo_redis:6379/1
      FRONTEND_URL: "${FRONTEND_URL:?FRONTEND_URL must be set to a non-localhost URL for prod-test (e.g. http://host.docker.internal:5173)}"
      MAILER_SENDER_EMAIL: noreply@evoai.local
      DOORKEEPER_JWT_SECRET_KEY: "a]i9F#k2$$Lm7Nq0R!sT4uW6xZ8bD1eG3hJ5oP7rV9yAcE2fH4jM6pS8vX0zB3dK5nQ7tU9wY1"
      DOORKEEPER_JWT_ALGORITHM: hs256
      DOORKEEPER_JWT_ISS: evo-auth-service
      MFA_ISSUER: EvoAI
      SIDEKIQ_CONCURRENCY: 10
      ACTIVE_STORAGE_SERVICE: local
    depends_on:
      evo_postgres:
        condition: service_healthy
      evo_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  evo_auth_sidekiq:
    image: evoapicloud/evo-auth-service-community:latest
    command: sh -c "bundle exec sidekiq"
    # Disable inherited HTTP healthcheck — Sidekiq has no web server.
    healthcheck:
      disable: true
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: "a]i9F#k2$$Lm7Nq0R!sT4uW6xZ8bD1eG3hJ5oP7rV9yAcE2fH4jM6pS8vX0zB3dK5nQ7tU9wY1"
      JWT_SECRET_KEY: "a]i9F#k2$$Lm7Nq0R!sT4uW6xZ8bD1eG3hJ5oP7rV9yAcE2fH4jM6pS8vX0zB3dK5nQ7tU9wY1"
      EVOAI_CRM_API_TOKEN: 6e10e689-58ce-4416-bf0d-f5818bf2dcf8
      POSTGRES_HOST: evo_postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: evoai_dev_password
      POSTGRES_DATABASE: evo_community
      REDIS_URL: redis://:evoai_redis_pass@evo_redis:6379/1
      SIDEKIQ_CONCURRENCY: 10
    depends_on:
      evo_postgres:
        condition: service_healthy
      evo_redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # CRM Service (Ruby / Rails) — Port 3000
  # ---------------------------------------------------------------------------
  evo_crm:
    image: evoapicloud/evo-ai-crm-community:latest
    command: sh -c "bundle exec rails db:prepare && bundle exec rails s -p 3000 -b 0.0.0.0"
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: production
      RAILS_SERVE_STATIC_FILES: "true"
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE: "a]i9F#k2$$Lm7Nq0R!sT4uW6xZ8bD1eG3hJ5oP7rV9yAcE2fH4jM6pS8vX0zB3dK5nQ7tU9wY1"
      JWT_SECRET_KEY: "a]i9F#k2$$Lm7Nq0R!sT4uW6xZ8bD1eG3hJ5oP7rV9yAcE2fH4jM6pS8vX0zB3dK5nQ7tU9wY1"
      EVOAI_CRM_API_TOKEN: 6e10e689-58ce-4416-bf0d-f5818bf2dcf8
      POSTGRES_HOST: evo_postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: evoai_dev_password
      POSTGRES_DATABASE: evo_community
      REDIS_URL: redis://:evoai_redis_pass@evo_redis:6379/0
      EVO_AUTH_SERVICE_URL: http://evo_auth:3001
      EVO_AI_CORE_SERVICE_URL: http://evo_core:5555
      BACKEND_URL: "${BACKEND_URL:?BACKEND_URL must be set to a non-localhost URL for prod-test (e.g. http://host.docker.internal:3030)}"
      FRONTEND_URL: "${FRONTEND_URL:?FRONTEND_URL must be set to a non-localhost URL for prod-test (e.g. http://host.docker.internal:5173)}"
      # CORS origins are the browser's Origin header (Vite serves on localhost:5173 from the host machine);
      # they are independent of BACKEND_URL/FRONTEND_URL which are CRM-side URLs.
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:5173,http://localhost:3030}"
      DISABLE_TELEMETRY: "true"
      LOG_LEVEL: info
      ENABLE_ACCOUNT_SIGNUP: "true"
      ENABLE_PUSH_RELAY_SERVER: "true"
      ENABLE_INBOX_EVENTS: "true"
      BOT_RUNTIME_URL: http://evo_bot_runtime:8091
      BOT_RUNTIME_SECRET: evo-bot-runtime-dev-secret
      BOT_RUNTIME_POSTBACK_BASE_URL: http://evo_crm:3000
    depends_on:
      evo_postgres:
        condition: service_healthy
      evo_redis:
        condition: service_healthy
      evo_auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/auth/sign_in"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  evo_crm_sidekiq:
    image: evoapicloud/evo-ai-crm-community:latest
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    # Disable inherited HTTP healthcheck — Sidekiq has no web server.
    healthcheck:
      disable: true
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: "a]i9F#k2$$Lm7Nq0R!sT4uW6xZ8bD1eG3hJ5oP7rV9yAcE2fH4jM6pS8vX0zB3dK5nQ7tU9wY1"
      JWT_SECRET_KEY: "a]i9F#k2$$Lm7Nq0R!sT4uW6xZ8bD1eG3hJ5oP7rV9yAcE2fH4jM6pS8vX0zB3dK5nQ7tU9wY1"
      EVOAI_CRM_API_TOKEN: 6e10e689-58ce-4416-bf0d-f5818bf2dcf8
      POSTGRES_HOST: evo_postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: evoai_dev_password
      POSTGRES_DATABASE: evo_community
      REDIS_URL: redis://:evoai_redis_pass@evo_redis:6379/0
      EVO_AUTH_SERVICE_URL: http://evo_auth:3001
      EVO_AI_CORE_SERVICE_URL: http://evo_core:5555
      BOT_RUNTIME_URL: http://evo_bot_runtime:8091
      BOT_RUNTIME_SECRET: evo-bot-runtime-dev-secret
      BOT_RUNTIME_POSTBACK_BASE_URL: http://evo_crm:3000
    depends_on:
      evo_postgres:
        condition: service_healthy
      evo_redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Core Service (Go / Gin) — Port 5555
  # ---------------------------------------------------------------------------
  evo_core:
    image: evoapicloud/evo-ai-core-service-community:latest
    ports:
      - "5555:5555"
    environment:
      DB_HOST: evo_postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: evoai_dev_password
      DB_NAME: evo_community
      DB_SSLMODE: disable
      DB_MAX_IDLE_CONNS: 10
      DB_MAX_OPEN_CONNS: 100
      DB_CONN_MAX_LIFETIME: 1h
      DB_CONN_MAX_IDLE_TIME: 30m
      PORT: "5555"
      SECRET_KEY_BASE: "a]i9F#k2$$Lm7Nq0R!sT4uW6xZ8bD1eG3hJ5oP7rV9yAcE2fH4jM6pS8vX0zB3dK5nQ7tU9wY1"
      JWT_SECRET_KEY: "a]i9F#k2$$Lm7Nq0R!sT4uW6xZ8bD1eG3hJ5oP7rV9yAcE2fH4jM6pS8vX0zB3dK5nQ7tU9wY1"
      JWT_ALGORITHM: HS256
      ENCRYPTION_KEY: XoQPOBw2FrzjQS11utERG9qO2MsAnXFxlhIns_uUxRk=
      EVOLUTION_BASE_URL: http://evo_crm:3000
      EVO_AUTH_BASE_URL: http://evo_auth:3001
      AI_PROCESSOR_URL: http://evo_processor:8000
      AI_PROCESSOR_VERSION: v1
    depends_on:
      evo_postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Processor Service (Python / FastAPI) — Port 8000
  # ---------------------------------------------------------------------------
  evo_processor:
    image: evoapicloud/evo-ai-processor-community:latest
    ports:
      - "8000:8000"
    environment:
      POSTGRES_CONNECTION_STRING: postgresql://postgres:evoai_dev_password@evo_postgres:5432/evo_community
      REDIS_HOST: evo_redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: evoai_redis_pass
      REDIS_SSL: "false"
      REDIS_DB: 0
      REDIS_KEY_PREFIX: "a2a:"
      REDIS_TTL: 3600
      HOST: 0.0.0.0
      PORT: "8000"
      DEBUG: "false"
      SECRET_KEY_BASE: "a]i9F#k2$$Lm7Nq0R!sT4uW6xZ8bD1eG3hJ5oP7rV9yAcE2fH4jM6pS8vX0zB3dK5nQ7tU9wY1"
      ENCRYPTION_KEY: XoQPOBw2FrzjQS11utERG9qO2MsAnXFxlhIns_uUxRk=
      EVOAI_CRM_API_TOKEN: 6e10e689-58ce-4416-bf0d-f5818bf2dcf8
      EVO_AI_CRM_URL: http://evo_crm:3000
      CORE_SERVICE_URL: http://evo_core:5555/api/v1
      APP_URL: http://localhost:8000
      API_TITLE: Agent Processor Community
      API_DESCRIPTION: Agent Processor Community for Evo AI
      API_VERSION: 1.0.0
      API_URL: http://localhost:8000
      ORGANIZATION_NAME: Evo AI
      TOOLS_CACHE_ENABLED: "true"
      TOOLS_CACHE_TTL: 3600
    volumes:
      - evo_processor_logs:/app/logs
    depends_on:
      evo_postgres:
        condition: service_healthy
      evo_redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Bot Runtime (Go / Gin) — Port 8091
  # ---------------------------------------------------------------------------
  evo_bot_runtime:
    image: evoapicloud/evo-bot-runtime:latest
    ports:
      - "8091:8091"
    environment:
      LISTEN_ADDR: 0.0.0.0:8091
      REDIS_URL: redis://:evoai_redis_pass@evo_redis:6379
      AI_PROCESSOR_URL: http://evo_processor:8000
      BOT_RUNTIME_SECRET: evo-bot-runtime-dev-secret
      AI_CALL_TIMEOUT_SECONDS: 30
    depends_on:
      evo_redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Frontend (React / Vite / Nginx) — Port 5173
  # ---------------------------------------------------------------------------
  evo_frontend:
    image: evoapicloud/evo-ai-frontend-community:latest
    ports:
      - "5173:80"
    environment:
      VITE_APP_ENV: production
      VITE_API_URL: http://localhost:3030
      VITE_AUTH_API_URL: http://localhost:3030
      VITE_EVOAI_API_URL: http://localhost:3030
      VITE_AGENT_PROCESSOR_URL: http://localhost:3030

volumes:
  evo_postgres_data:
  evo_redis_data:
  evo_processor_logs:
